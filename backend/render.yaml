services:
  - type: web
    name: ghostfollow-ai-backend
    env: python
    buildCommand: pip install -r requirements.txt; playwright install chromium
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEMO_MODE
        value: "true"
      - key: DATABASE_URL
        sync: false
